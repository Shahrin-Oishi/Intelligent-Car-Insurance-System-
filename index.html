<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car Insurance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Smart Car Insurance</h1>
    <p>Next-gen Risk Based Calculator</p>

    <input type="text" id="ownerName" placeholder="Owner Name">

    <select id="carType">
        <option value="1.0">Sedan</option>
        <option value="1.5">SUV</option>
        <option value="2.5">Luxury</option>
    </select>

    <input type="number" id="carAge" placeholder="Car Age">

    
    <input type="number" id="driverAge" placeholder="Driver Age">
    <input type="number" id="experience" placeholder="Driving Experience (Years)">
    <input type="number" id="accidents" placeholder="Accident History">

    <select id="safety">
        <option value="0.9">Anti-Theft (Yes)</option>
        <option value="1.0">No Safety</option>
    </select>

    <button onclick="calculate()">Calculate</button>
    

    <div id="result"></div>

    <h3>History</h3>
    <ul id="history"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
